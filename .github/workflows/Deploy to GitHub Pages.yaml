name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Check pnpm
        run: pnpm -v

      - name: Install dependencies
        run: |
          pnpm approve-builds
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install
          fi

      # Ensure Next.js output is set to export in your next.config.js
      - name: Build & Export static site
        run: pnpm build

      # career.yueqiao.dev is the canonical domain (matches DATA.url, sitemap,
      # OG metadata, and the resumes). career.wic.monster currently serves an
      # SSL error (HTTP 526) — verify the repo's Settings -> Pages custom
      # domain also says career.yueqiao.dev after the next deploy.
      - name: Add CNAME and .nojekyll
        run: |
          echo "career.yueqiao.dev" > out/CNAME
          touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
